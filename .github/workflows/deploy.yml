name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code repository
        uses: actions/checkout@v4

      - name: Setup Node.js v20 environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Quality Guard
        run: npm run lint

      - name: Run Test Suite
        run: npm run test

      - name: Build Application
        run: npm run build

  dockerize-and-deploy:
    name: Dockerize and Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    # This job triggers only when changes are merged/pushed directly to the main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code repository
        uses: actions/checkout@v4

      - name: Extract Short Commit SHA
        id: git_info
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compile and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ steps.git_info.outputs.sha_short }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cicd-pipeline-demo:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cicd-pipeline-demo:${{ steps.git_info.outputs.sha_short }}

      - name: Trigger Webhook-based Render Deployment
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "Initiating production web-service deployment trigger..."
          if [ -z "$RENDER_HOOK" ]; then
            echo "========================================================================"
            echo "❌ ERROR: RENDER_DEPLOY_HOOK secret is empty or not configured!"
            echo "Please go to Settings -> Secrets and variables -> Actions in GitHub"
            echo "and ensure RENDER_DEPLOY_HOOK is added under Repository Secrets."
            echo "========================================================================"
            exit 1
          fi
          curl -f -X POST "$RENDER_HOOK"
          echo "Render deployment hook successfully called."

      - name: Output Summary Logs
        run: |
          echo "================================================================"
          echo "🚀 PIPELINE STATUS: SUCCESS"
          echo "Deployed commit $GITHUB_SHA to production"
          echo "Image tagged: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-pipeline-demo:latest"
          echo "Image tagged: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-pipeline-demo:${{ steps.git_info.outputs.sha_short }}"
          echo "================================================================"
